<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PTT Field Logger</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>PTT Field Logger</h1>
    <p class="subtitle">3M Pro-Comms BLE PTT test app</p>

    <section class="card">
      <button id="connectBtn">Connect Headset</button>
      <div id="connection">Not connected</div>
      <div id="state" class="released">PTT RELEASED</div>
      <div id="timer">00:00.0</div>
      <canvas id="vu" width="320" height="42"></canvas>
    </section>

    <section class="card">
      <h2>Current Session</h2>
      <div id="currentSession">No active session</div>
    </section>

    <section class="card">
      <h2>Session Log</h2>
      <button id="exportBtn">Download JSON Log</button>
      <button id="clearBtn">Clear Log</button>
      <div id="sessionLog"></div>
    </section>

    <section class="card">
      <h2>Raw Event Log</h2>
      <div id="rawLog"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
